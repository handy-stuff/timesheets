<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Reader - Handy Tools</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #e2e6ea;
      --border-hover: #c4cdd5;
      --text: #1c2127;
      --text-muted: #637381;
      --text-faint: #919eab;
      --primary: #1a56db;
      --primary-hover: #1749b8;
      --primary-light: #eef2ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-hover: 0 6px 20px rgba(0,0,0,0.08);
      --transition: 200ms ease;
      --font: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 20px 40px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 18px;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--primary);
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header p {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-left: 48px;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .input,
    .select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-soft);
      color: var(--text);
      font-size: 15px;
      padding: 0 14px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .input:focus,
    .select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.12);
      background: var(--surface);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--border-hover);
      background: var(--surface-soft);
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 10px;
      background: var(--primary-light);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .container { padding: 32px 16px 32px; }
      .page-header h1 { font-size: 22px; }
      .page-header p { padding-left: 0; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <a class="back-link" href="../../index.html">← Back to Handy Tools</a>
      <h1>
        <span aria-hidden="true">🔊</span>
        <span>Word Reader</span>
      </h1>
      <p>Type a word and hear it spoken aloud using your browser’s built-in speech engine.</p>
    </header>

    <section class="app-card">
      <div class="field">
        <label for="wordInput">Word</label>
        <input
          id="wordInput"
          class="input"
          type="text"
          placeholder="Example: pronunciation"
          autocomplete="off"
        />
      </div>

      <div class="field">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect" class="select"></select>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="speakBtn" type="button">Speak</button>
        <button class="btn btn-secondary" id="repeatBtn" type="button">Repeat</button>
        <button class="btn btn-secondary" id="stopBtn" type="button">Stop</button>
      </div>

      <div class="status" id="status">Ready. Type a word and press Speak.</div>
      <div class="hint">
        If the voice list is empty at first, wait a moment. Some browsers load voices after the page opens.
      </div>
    </section>
  </main>

  <script>
    const synth = window.speechSynthesis;
    const wordInput = document.getElementById('wordInput');
    const voiceSelect = document.getElementById('voiceSelect');
    const speakBtn = document.getElementById('speakBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');

    let voices = [];
    let lastWord = '';

    function setStatus(message) {
      status.textContent = message;
    }

    function populateVoices() {
      voices = synth.getVoices().sort((a, b) => a.name.localeCompare(b.name));
      voiceSelect.innerHTML = '';

      if (!voices.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No voices available yet';
        voiceSelect.appendChild(option);
        return;
      }

      voices.forEach((voice, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${voice.name} (${voice.lang})${voice.default ? ' — default' : ''}`;
        voiceSelect.appendChild(option);
      });

      const englishVoice = voices.findIndex(v => v.lang.toLowerCase().startsWith('en'));
      voiceSelect.selectedIndex = englishVoice >= 0 ? englishVoice : 0;
    }

    function speakWord(word) {
      const cleanWord = (word || '').trim();

      if (!cleanWord) {
        setStatus('Please enter a word first.');
        wordInput.focus();
        return;
      }

      synth.cancel();

      const utterance = new SpeechSynthesisUtterance(cleanWord);
      const selectedVoice = voices[Number(voiceSelect.value)];

      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }

      utterance.rate = 0.9;
      utterance.pitch = 1;

      utterance.onstart = () => setStatus(`Speaking: ${cleanWord}`);
      utterance.onend = () => setStatus(`Finished: ${cleanWord}`);
      utterance.onerror = () => setStatus('Sorry, the browser could not speak that word.');

      lastWord = cleanWord;
      synth.speak(utterance);
    }

    speakBtn.addEventListener('click', () => speakWord(wordInput.value));
    repeatBtn.addEventListener('click', () => speakWord(lastWord || wordInput.value));

    stopBtn.addEventListener('click', () => {
      synth.cancel();
      setStatus('Stopped.');
    });

    wordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        speakWord(wordInput.value);
      }
    });

    populateVoices();

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = populateVoices;
    }
  </script>
</body>
</html>
