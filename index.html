<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Snipets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --space-2: .5rem; --space-3: .75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --radius-md: .75rem; --radius-lg: 1rem;
      --shadow-sm: 0 1px 2px rgba(16,24,40,.06);
      --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
      --bg: #f4f4f6; --surface:#ffffff; --border:#dcdce4; --divider:#e8e8ee;
      --text:#23242a; --text-muted:#6c6f7d; --text-faint:#9598a6;
      --primary:#2e93e6; --primary-soft:#e8f2fd;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font-body);
      font-size:var(--text-base);
      color:var(--text);
      background:linear-gradient(180deg,var(--surface) 0 210px,var(--bg) 210px 100%);
    }
    .hero{
      padding:var(--space-12) var(--space-4) var(--space-8);
      text-align:center;
      border-bottom:1px solid var(--divider);
      background:var(--surface);
    }
    .title{
      font-size:clamp(2rem,1.5rem + 2vw,3rem);
      font-weight:800;
      letter-spacing:-.03em;
      margin:0 0 var(--space-6);
    }
    .search-wrap{max-width:560px;margin:0 auto}
    input[type="search"]{
      width:100%;
      height:52px;
      border-radius:var(--radius-md);
      border:1px solid var(--border);
      padding:0 var(--space-4);
      font-size:1rem;
      box-shadow:var(--shadow-sm);
    }
    .layout{
      max-width:1200px;
      margin:0 auto;
      padding:var(--space-8) var(--space-4) var(--space-12);
      display:grid;
      grid-template-columns:260px 1fr;
      gap:var(--space-6);
    }
    .sidebar,.main{
      background:var(--surface);
      border-radius:var(--radius-lg);
      border:1px solid var(--border);
      padding:var(--space-5);
    }
    .muted{font-size:var(--text-sm);color:var(--text-muted)}
    .category-list{
      margin-top:var(--space-5);
      display:grid;
      gap:.5rem;
      font-size:.95rem;
    }
    .check-row{display:flex;align-items:center;gap:.5rem}
    .check-row input{width:18px;height:18px;accent-color:var(--primary)}
    .header-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:.75rem;
      flex-wrap:wrap;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:var(--space-4);
      margin-top:var(--space-4);
    }
    .card{
      border-radius:var(--radius-lg);
      border:1px solid var(--border);
      padding:var(--space-4);
      display:flex;
      flex-direction:column;
      gap:.75rem;
      background:var(--surface);
    }
    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:.5rem;
    }
    .card-title{margin:0;font-size:1rem;font-weight:600}
    .chip{
      font-size:.8rem;
      padding:.25rem .5rem;
      border-radius:999px;
      background:#f0f1f5;
      color:var(--text-muted);
    }
    .file-ref{
      font-family:var(--font-mono);
      font-size:.8rem;
      padding:.3rem .5rem;
      border-radius:.5rem;
      background:#f8f8fb;
      border:1px dashed var(--border);
      color:var(--text-muted);
    }
    .preview{
      font-family:var(--font-mono);
      font-size:.84rem;
      background:#f8f8fb;
      border-radius:.75rem;
      border:1px solid var(--divider);
      padding:.75rem;
      min-height:130px;
      max-height:170px;
      overflow:auto;
      white-space:pre-wrap;
    }
    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:.35rem;
      font-size:.78rem;
      margin-top:.25rem;
    }
    .tag{
      padding:.2rem .45rem;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary);
    }
    .card-actions{display:flex;gap:.5rem;margin-top:.5rem}
    .btn{
      flex:1 1 auto;
      min-height:40px;
      border-radius:.75rem;
      border:0;
      font-weight:600;
      font-size:.9rem;
      cursor:pointer;
      background:var(--primary);
      color:#ffffff;
    }
    .icon-btn{
      width:44px;
      min-height:40px;
      border-radius:.75rem;
      border:1px solid var(--border);
      background:#f8f8fb;
      font-size:1.1rem;
      cursor:pointer;
    }
    .empty{
      margin-top:1.5rem;
      padding:2rem;
      text-align:center;
      border-radius:1rem;
      border:1px dashed var(--border);
      background:#f8f8fb;
      color:var(--text-muted);
      font-size:.95rem;
    }
    .small-note{
      margin-top:var(--space-4);
      font-size:var(--text-sm);
      color:var(--text-faint);
    }
    @media(max-width:880px){
      .layout{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1 class="title">🤖 Code Snipets</h1>
    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="Search by title, tags, text, or file name..." />
    </div>
  </header>
  <main class="layout">
    <aside class="sidebar">
      <h2 style="margin:0 0 .25rem;font-size:1rem;">Categories</h2>
      <div class="muted">Filter snippets</div>
      <div id="categoryList" class="category-list"></div>
      <div class="small-note">
        Files live in <code>snippets/code/</code> inside your repo.
        JSON only stores the file name, the app adds the folder prefix.
      </div>
    </aside>
    <section class="main">
      <div class="header-row">
        <div>
          <h2 id="resultsLabel" style="margin:0 0 .15rem;font-size:1rem;">Showing 0 snippets</h2>
          <div class="muted">Your reusable code library</div>
        </div>
      </div>
      <div id="snippetGrid" class="grid"></div>
    </section>
  </main>
  <script>
    const SNIPPET_BASE = 'snippets/code/';

    async function loadConfig() {
      const res = await fetch('snippets/snippets.json');
      if (!res.ok) throw new Error('Cannot load snippets/snippets.json');
      return res.json();
    }

    async function loadSnippet(entry) {
      const fullPath = SNIPPET_BASE + entry.file;
      try {
        const res = await fetch(fullPath);
        if (!res.ok) throw new Error('missing');
        const code = await res.text();
        return { ...entry, code, filePath: fullPath };
      } catch (err) {
        return {
          ...entry,
          code: `File not found yet: ${fullPath}\n\nCreate this file in the repo under snippets/code/.`,
          filePath: fullPath,
          missing: true
        };
      }
    }

    const state = { items: [], categories: [], selectedCats: new Set() };
    const els = {
      grid: document.getElementById('snippetGrid'),
      cats: document.getElementById('categoryList'),
      search: document.getElementById('searchInput'),
      label: document.getElementById('resultsLabel')
    };

    const esc = t => String(t || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');

    function computeCategories() {
      state.categories = [...new Set(
        state.items.map(i => i.category).filter(Boolean)
      )].sort();
    }

    function renderCategories() {
      if (!state.categories.length) {
        els.cats.innerHTML = '<div class="muted">No categories yet</div>';
        return;
      }
      els.cats.innerHTML = state.categories.map(c => `
        <label class="check-row">
          <input type="checkbox" value="${esc(c)}" ${state.selectedCats.has(c) ? 'checked' : ''} />
          <span>${esc(c)}</span>
        </label>
      `).join('');
      els.cats.querySelectorAll('input').forEach(input => {
        input.addEventListener('change', () => {
          const val = input.value;
          if (input.checked) state.selectedCats.add(val); else state.selectedCats.delete(val);
          renderGrid();
        });
      });
    }

    function filteredItems() {
      const q = els.search.value.trim().toLowerCase();
      return state.items.filter(item => {
        const catOk = state.selectedCats.size === 0 || state.selectedCats.has(item.category);
        const hay = [
          item.title,
          item.category,
          item.description,
          item.filePath,
          item.code,
          ...(item.tags || [])
        ].join(' ').toLowerCase();
        const textOk = !q || hay.includes(q);
        return catOk && textOk;
      });
    }

    function renderGrid() {
      const items = filteredItems();
      els.label.textContent = `Showing ${items.length} snippet${items.length === 1 ? '' : 's'}`;
      if (!items.length) {
        els.grid.innerHTML = '<div class="empty"><strong>No snippets found.</strong><br/>Try another search or add more snippet files in <code>snippets/code/</code>.</div>';
        return;
      }
      els.grid.innerHTML = items.map(item => `
        <article class="card">
          <div class="card-head">
            <h3 class="card-title">${esc(item.title)}</h3>
            <span class="chip">${esc(item.category)}</span>
          </div>
          <div class="file-ref">${esc(item.filePath)}</div>
          <div class="preview">${esc(item.description || '')}\n\n${esc(item.code || '')}</div>
          <div class="tags">
            ${(item.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
          </div>
          <div class="card-actions">
            <button class="btn" data-copy="${item.id}">Copy Code</button>
            <button class="icon-btn" data-path="${item.id}" title="Show file path">↗</button>
          </div>
        </article>
      `).join('');

      els.grid.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const item = state.items.find(i => i.id === btn.dataset.copy);
          if (!item) return;
          await navigator.clipboard.writeText(item.code || '');
          const old = btn.textContent; btn.textContent = 'Copied';
          setTimeout(() => btn.textContent = old, 1200);
        });
      });

      els.grid.querySelectorAll('[data-path]').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = state.items.find(i => i.id === btn.dataset.path);
          if (!item) return;
          alert(`File in repo:\n${item.filePath}`);
        });
      });
    }

    async function init() {
      try {
        const config = await loadConfig();
        const loaded = await Promise.all(config.map(loadSnippet));
        state.items = loaded;
        computeCategories();
        renderCategories();
        renderGrid();
      } catch (err) {
        els.label.textContent = 'Error loading snippets';
        els.grid.innerHTML = `<div class="empty">${esc(err.message)}</div>`;
      }
    }

    els.search.addEventListener('input', renderGrid);
    init();
  </script>
</body>
</html>
